---
# --------------------------------------------------------------
# Playbook: gather-windows-accounts.yml
# Purpose : Enumerate local Windows accounts, report enabled/disabled
#           status and write a single aggregated file on the
#           control node.
# --------------------------------------------------------------

- name: Gather local Windows accounts and enabled/disabled status
  hosts: windows                # ← adjust to your inventory group / host list
  gather_facts: false
  become: true                  # required to read the local SAM information
  become_method: runas

  vars:
    # Path on the **control** node where the final aggregated report will be written
    aggregated_file: "/tmp/local-windows-accounts_{{ now('%Y-%m-%d') }}.txt"

  tasks:

    # -----------------------------------------------------------------
    # Pull the list of local accounts with the most useful fields
    # -----------------------------------------------------------------
    - name: Query local Windows accounts (PowerShell)
      win_shell: |
        # Use the modern cmdlet when it exists; fall back to WMI otherwise
        if (Get-Command -Name Get-LocalUser -ErrorAction SilentlyContinue) {
          Get-LocalUser |
            Select-Object `
              Name,
              Enabled,
              Description,
              FullName,
              PasswordLastSet,
              PasswordExpires,
              PasswordRequired,
              UserMayChangePassword,
              PasswordNeverExpires,
              SID |
            ConvertTo-Json -Depth 3
        }
        else {
          # Older OS – use Win32_UserAccount (adds Domain and Disabled columns)
          Get-WmiObject -Class Win32_UserAccount -Filter "LocalAccount=True" |
            Select-Object `
              Name,
              Disabled,
              Description,
              FullName,
              SID |
            ConvertTo-Json -Depth 3
        }
      register: accounts_ps
      changed_when: false

    # -----------------------------------------------------------------
    # Parse the JSON output into a structured fact (list of dicts)
    # -----------------------------------------------------------------
    - name: Load account data into a fact
      set_fact:
        raw_accounts: "{{ accounts_ps.stdout | from_json }}"
      when: accounts_ps.stdout != ''

    # -----------------------------------------------------------------
    # Normalise the data – make sure we always have an “Enabled” flag
    # -----------------------------------------------------------------
    - name: Normalise account list
      set_fact:
        local_accounts: >-
          {{
            raw_accounts |
            map('combine', {
              'Enabled':
                (item.Enabled is defined)   # modern Get‑LocalUser
                  | ternary(item.Enabled,
                    # fallback for the WMI path – WMI uses “Disabled”
                    (item.Disabled is defined) | ternary( not item.Disabled, 'unknown')
                  )
            }) |
            list
          }}
      when: raw_accounts is defined

    # -----------------------------------------------------------------
    # (Optional) Show the gathered data per host – handy for debugging
    # -----------------------------------------------------------------
    - name: Display accounts for this host
      debug:
        var: local_accounts

    # -----------------------------------------------------------------
    # Capture a UTC timestamp for the host – used in the final report
    # -----------------------------------------------------------------
    - name: Capture UTC timestamp for this host
      win_shell: |
        Get-Date -Format "yyyy-MM-dd HH:mm:ss 'UTC'"
      register: host_timestamp
      changed_when: false

  # --------------------------------------------------------------
  # After every host is processed, aggregate everything on the control node
  # --------------------------------------------------------------
  post_tasks:

    - name: Write aggregated report to {{ aggregated_file }} on the control node
      copy:
        # Jinja2 loop walks the whole inventory and pulls the two pieces we saved
        content: |
          {% for h in groups['windows'] %}
          ### {{ h }} ###
          Timestamp: {{ hostvars[h]['host_timestamp']['stdout'] | default('N/A') }}

          {% for acct in hostvars[h]['local_accounts'] | default([]) %}
          - username          : {{ acct.Name }}
            enabled           : {{ acct.Enabled | default('unknown') }}
            description       : {{ acct.Description | default('') }}
            full_name         : {{ acct.FullName | default('') }}
            sid               : {{ acct.SID | default('') }}
            password_last_set : {{ acct.PasswordLastSet | default('') }}
            password_expires  : {{ acct.PasswordExpires | default('') }}
            password_required : {{ acct.PasswordRequired | default('') }}
            user_may_change   : {{ acct.UserMayChangePassword | default('') }}
            password_never_expires : {{ acct.PasswordNeverExpires | default('') }}
          {% endfor %}

          {% endfor %}
        dest: "{{ aggregated_file }}"
        mode: '0644'
      delegate_to: localhost
      run_once: true               # only one host writes the file
      changed_when: true

    - name: Show the path of the aggregated file (optional)
      debug:
        msg: "Aggregated Windows‑account report written to {{ aggregated_file }} on the control node."
      delegate_to: localhost
      run_once: true
