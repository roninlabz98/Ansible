---
# --------------------------------------------------------------
# Playbook : check_password_aging_windows.yml
# Purpose  : Gather local‑account password‑aging information on
#            Windows hosts and write a single aggregated report
#            on the Ansible control node.
# --------------------------------------------------------------

- name: Gather Windows password‑aging policies for all local accounts
  hosts: windows                 # adjust to your inventory group / host list
  gather_facts: false
  become: true                   # needed to read local SAM info
  become_method: runas

  vars:
    # Path on the **control** node where the final aggregated report will be stored
    aggregated_file: "/tmp/password-aging-windows_{{ now('%Y-%m-%d') }}.txt"

  tasks:

    # -----------------------------------------------------------------
    # Obtain the system‑wide “Maximum password age” (in days)
    # -----------------------------------------------------------------
    - name: Get maximum password age with net accounts
      win_shell: |
        net accounts | findstr /R /C:"Maximum password age"
      register: max_age_raw
      changed_when: false
      # Example line on a default system:
      #   Maximum password age (days):                42
      # If the line is missing the policy is “Unlimited”.

    - name: Parse the max‑age value
      set_fact:
        max_password_age_days: >-
          {{ (max_age_raw.stdout | regex_search('([0-9]+)')) | default('0') | int }}

    # -----------------------------------------------------------------
    # Pull the list of **local** users (modern cmdlet, fallback to WMI)
    # -----------------------------------------------------------------
    - name: Query local Windows accounts (PowerShell)
      win_shell: |
        if (Get-Command -Name Get-LocalUser -ErrorAction SilentlyContinue) {
          Get-LocalUser |
            Select-Object Name,Enabled,PasswordLastSet,PasswordExpires,SID |
            ConvertTo-Json -Depth 3
        }
        else {
          # Old OS – use Win32_UserAccount (adds Disabled, Description, SID)
          Get-WmiObject -Class Win32_UserAccount -Filter "LocalAccount=True" |
            Select-Object Name,Disabled,PasswordChangeable,PasswordExpires,SID |
            ConvertTo-Json -Depth 3
        }
      register: local_users_ps
      changed_when: false

    - name: Load raw account data into a fact
      set_fact:
        raw_user_list: "{{ local_users_ps.stdout | from_json }}"
      when: local_users_ps.stdout != ''

    # -----------------------------------------------------------------
    # Normalise the data – make sure every entry has the same keys
    # -----------------------------------------------------------------
    - name: Normalise user list
      set_fact:
        local_accounts: >-
          {{
            raw_user_list |
            map('combine', {
              # Modern cmdlet already gives us Enabled, PasswordLastSet,
              # PasswordExpires, SID – we just need to make sure the
              # keys exist when we fall back to WMI.
              'Enabled':
                (item.Enabled is defined)   | ternary(item.Enabled,
                  (item.Disabled is defined) | ternary( not item.Disabled, false)),
              'PasswordLastSet':
                (item.PasswordLastSet is defined) | ternary(item.PasswordLastSet, null),
              'PasswordExpires':
                (item.PasswordExpires is defined) | ternary(item.PasswordExpires,
                  (item.PasswordExpires is defined) | ternary(item.PasswordExpires, false))
            }) |
            list
          }}
      when: raw_user_list is defined

    # -----------------------------------------------------------------
    # Compute the **expiration date** for each account (if applicable)
    # -----------------------------------------------------------------
    - name: Add computed expiration date to each account
      set_fact:
        local_accounts: >-
          {{
            local_accounts |
            map('combine', {
              'ExpiresOn':
                ( (item.PasswordExpires | bool) and (max_password_age_days > 0) and (item.PasswordLastSet is not none) )
                  | ternary(
                      ( item.PasswordLastSet | regex_replace('([0-9]+)\\.([0-9]+)\\.([0-9]+) ([0-9]+):([0-9]+):([0-9]+)', '\\1-\\2-\\3 \\4:\\5:\\6') |
                        to_datetime('%Y-%m-%d %H:%M:%S') + timedelta(days=max_password_age_days) ) | string,
                      '' )
            }) |
            list
          }}
      when: local_accounts is defined

    # -----------------------------------------------------------------
    # (Optional) Show what we collected for the current host – handy while testing
    # -----------------------------------------------------------------
    - name: Display local accounts with aging info for this host
      debug:
        var: local_accounts

    # -----------------------------------------------------------------
    # Capture a UTC timestamp for the host – will be added to the final report
    # -----------------------------------------------------------------
    - name: Capture UTC timestamp for this host
      win_shell: |
        Get-Date -Format "yyyy-MM-dd HH:mm:ss 'UTC'"
      register: host_timestamp
      changed_when: false

  # --------------------------------------------------------------
  # After every host is processed, aggregate everything on the control node
  # --------------------------------------------------------------
  post_tasks:

    - name: Write aggregated password‑aging report to {{ aggregated_file }} on the control node
      copy:
        # Jinja2 iterates over all hosts in the *windows* group,
        # pulling the per‑host timestamp and the local_accounts list.
        content: |
          {% for h in groups['windows'] %}
          ### {{ h }} ###
          Timestamp: {{ hostvars[h]['host_timestamp']['stdout'] | default('N/A') }}
          System‑wide maximum password age: {{ hostvars[h]['max_password_age_days'] }} day(s)

          {% if hostvars[h]['local_accounts'] is defined and hostvars[h]['local_accounts'] | length > 0 %}
          {% for acct in hostvars[h]['local_accounts'] %}
          - username   : {{ acct.Name }}
            enabled    : {{ acct.Enabled }}
            sid        : {{ acct.SID }}
            password_last_set : {{ acct.PasswordLastSet | default('N/A') }}
            password_expires_flag : {{ acct.PasswordExpires }}
            expires_on : {{ acct.ExpiresOn | default('never') }}
          {% endfor %}
          {% else %}
          No local accounts discovered on this host.
          {% endif %}

          {% endfor %}
        dest: "{{ aggregated_file }}"
        mode: '0644'
      delegate_to: localhost
      run_once: true               # only one host writes the file
      changed_when: true

    - name: Show where the aggregated file was written (optional)
      debug:
        msg: "Aggregated Windows password‑aging report written to {{ aggregated_file }} on the control node."
      delegate_to: localhost
      run_once: true
