---
# --------------------------------------------------------------
# Playbook: gather_hardware.yml
# Purpose : Collect Make / Model / Serial Number / OS from Linux
#           hosts and write one CSV on the Ansible control node.
# --------------------------------------------------------------

- name: Gather hardware inventory from Linux hosts
  hosts: all
  gather_facts: true
  any_errors_fatal: false

  vars:
    dmidecode_ignore:
      - "0"
      - ""
      - "None"
      - "Not Specified"
      - "To Be Filled By O.E.M."
      - "System Serial Number"

  tasks:

    - name: Get system manufacturer
      ansible.builtin.command: dmidecode -s system-manufacturer
      register: _make
      changed_when: false
      failed_when: false
      become: true

    - name: Get system product name
      ansible.builtin.command: dmidecode -s system-product-name
      register: _model
      changed_when: false
      failed_when: false
      become: true

    - name: Get system serial number
      ansible.builtin.command: dmidecode -s system-serial-number
      register: _sn
      changed_when: false
      failed_when: false
      become: true

    - name: Set cleaned hardware facts for this host
      ansible.builtin.set_fact:
        hw_make: >-
          {{
            (_make.stdout | default('') | trim)
            if (_make.rc == 0 and (_make.stdout | default('') | trim) != '')
            else 'unknown'
          }}
        hw_model: >-
          {{
            (_model.stdout | default('') | trim)
            if (_model.rc == 0 and (_model.stdout | default('') | trim) != '')
            else 'unknown'
          }}
        hw_sn_raw: "{{ _sn.stdout | default('') | trim }}"
        hw_os: "{{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}"

    - name: Clean serial number value
      ansible.builtin.set_fact:
        hw_sn: >-
          {{
            hw_sn_raw
            if hw_sn_raw not in dmidecode_ignore
            else 'unknown'
          }}


- name: Write aggregated hardware inventory on control node
  hosts: localhost
  gather_facts: false
  become: true

  vars:
    hardware_inventory_file: "/tmp/hardware_inventory.csv"

  tasks:

    - name: Write hardware inventory CSV
      ansible.builtin.copy:
        dest: "{{ hardware_inventory_file }}"
        mode: "0644"
        content: |
          "Host","Make","Model","Serial Number","OS"
          {% for host in groups['all'] %}
          "{{ host }}","{{ hostvars[host].hw_make | default('unknown') | replace('"', '""') }}","{{ hostvars[host].hw_model | default('unknown') | replace('"', '""') }}","{{ hostvars[host].hw_sn | default('unknown') | replace('"', '""') }}","{{ hostvars[host].hw_os | default('unknown') | replace('"', '""') }}"
          {% endfor %}

    - name: Display CSV location
      ansible.builtin.debug:
        msg: "Hardware inventory saved to {{ hardware_inventory_file }}"

    - name: Display the CSV file
      ansible.builtin.command: cat "{{ hardware_inventory_file }}"
      register: csv_content
      changed_when: false

    - name: Print CSV content
      ansible.builtin.debug:
        msg: |
          ==============================
          Hardware inventory collected:
          ==============================
          {{ csv_content.stdout }}
