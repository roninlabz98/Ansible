---
# --------------------------------------------------------------
# Playbook: check_password_aging.yml
# Purpose : Gather password‑aging policies (chage output) for all
#           local users on Linux hosts and write a combined report
#           to /tmp/password‑aging.txt on the Ansible control node.
# --------------------------------------------------------------

- name: Gather password aging policies for all local users
  hosts: all                    # adjust to the inventory group you need
  become: true                  # reading /etc/shadow / running chage requires root
  gather_facts: false

  vars:
    # Minimum UID that you consider a “real” user.
    # On many distributions normal users start at 1000,
    # but you can set this to 0 to include system accounts.
    min_uid: 0

    # Path on the **control** node where the aggregated report will be stored
    aggregated_file: /tmp/password-aging_{{ now('%Y-%m-%d') }}.txt

  # -----------------------------------------------------------------
  # Clean any previous aggregated file (run once on the control node)
  # -----------------------------------------------------------------

  tasks:

    # ------------------------------------------------------------
    # Read the /etc/passwd file
    # ------------------------------------------------------------
    - name: Read /etc/passwd
      ansible.builtin.command: cat /etc/passwd
      register: passwd_file
      changed_when: false

    # ------------------------------------------------------------
    # Split each line into a list of fields
    # ------------------------------------------------------------
    - name: Split passwd lines into a list of fields
      ansible.builtin.set_fact:
        passwd_entries: "{{ passwd_file.stdout_lines | map('split', ':') | list }}"

    # ------------------------------------------------------------
    # Initialise an empty list that will hold the user dicts
    # ------------------------------------------------------------
    - name: Initialise empty users list
      ansible.builtin.set_fact:
        users: []

    # ------------------------------------------------------------
    # Populate the users list, filtering on UID
    # ------------------------------------------------------------
    - name: Build user dictionaries (apply min_uid filter)
      ansible.builtin.set_fact:
        users: "{{ users + [ user_dict ] }}"
      vars:
        user_dict:
          username: "{{ item[0] }}"
          uid: "{{ item[2] | int }}"
          gid: "{{ item[3] | int }}"
          comment: "{{ item[4] }}"
          home: "{{ item[5] }}"
          shell: "{{ item[6] }}"
      loop: "{{ passwd_entries }}"
      loop_control:
        label: "{{ item[0] }}"
      when: (item[2] | int) >= min_uid

    # ------------------------------------------------------------
    # Run `chage -l` for every user in the list
    # ------------------------------------------------------------
    - name: Query password aging info with chage for each user
      ansible.builtin.command: chage -l {{ item.username }}
      changed_when: false
      register: chage_output
      loop: "{{ users }}"
      loop_control:
        label: "{{ item.username }}"
      ignore_errors: true       # accounts without a password entry will return non‑zero
      when: users | length > 0

    # ------------------------------------------------------------
    # Parse the `chage` output into a structured list
    # ------------------------------------------------------------
    - name: Build password_aging list from chage results
      ansible.builtin.set_fact:
        password_aging: "{{ password_aging | default([]) + [ parsed ] }}"
      vars:
        username: "{{ item.item.username }}"
        lines: "{{ item.stdout_lines }}"
        parsed: >-
          {{
            {
              "username"          : username,
              "rc"                : item.rc,
              "min_days"          : (lines | select('match', '^Minimum number of days between password change') | first | default('') | regex_replace('^Minimum number of days between password change\\s*:\\s*', '')),
              "max_days"          : (lines | select('match', '^Maximum number of days between password change') | first | default('') | regex_replace('^Maximum number of days between password change\\s*:\\s*', '')),
              "warn_days"         : (lines | select('match', '^Number of days of warning before password expires') | first | default('') | regex_replace('^Number of days of warning before password expires\\s*:\\s*', '')),
              "last_change"       : (lines | select('match', '^Last password change') | first | default('') | regex_replace('^Last password change\\s*:\\s*', '')),
              "password_expires"  : (lines | select('match', '^Password expires') | first | default('') | regex_replace('^Password expires\\s*:\\s*', '')),
              "password_inactive" : (lines | select('match', '^Password inactive') | first | default('') | regex_replace('^Password inactive\\s*:\\s*', '')),
              "account_expires"   : (lines | select('match', '^Account expires') | first | default('') | regex_replace('^Account expires\\s*:\\s*', ''))
            }
          }}
      loop: "{{ chage_output.results | default([]) }}"
      loop_control:
        label: "{{ item.item.username }}"
      changed_when: false

    # ------------------------------------------------------------
    # Capture a UTC timestamp for this host (will be used in the final file)
    # ------------------------------------------------------------
    - name: Capture UTC timestamp for this host
      ansible.builtin.command: date -u +"%Y-%m-%d %H:%M:%S UTC"
      register: host_timestamp
      changed_when: false

    # ------------------------------------------------------------
    # (Optional) Show the data collected for this host
    # ------------------------------------------------------------
    - name: Display password aging policies for this host
      ansible.builtin.debug:
        var: password_aging

  # -----------------------------------------------------------------
  # After all hosts are processed, write a single aggregated report
  # -----------------------------------------------------------------
  post_tasks:
    - name: Write aggregated password‑aging report to {{ aggregated_file }} on the control node
      ansible.builtin.copy:
        # Jinja2 iterates over every inventory host and pulls its timestamp &
        # its password_aging list.
        content: |
          {% for h in groups['all'] %}
          ### {{ h }} ###
          Timestamp: {{ hostvars[h]['host_timestamp']['stdout'] | default('N/A') }}

          {% if hostvars[h]['password_aging'] is defined and hostvars[h]['password_aging'] | length > 0 %}
          {% for entry in hostvars[h]['password_aging'] %}
          - username          : {{ entry.username }}
            rc                : {{ entry.rc }}
            min_days          : {{ entry.min_days }}
            max_days          : {{ entry.max_days }}
            warn_days         : {{ entry.warn_days }}
            last_change       : {{ entry.last_change }}
            password_expires  : {{ entry.password_expires }}
            password_inactive : {{ entry.password_inactive }}
            account_expires   : {{ entry.account_expires }}
          {% endfor %}
          {% else %}
          No password‑aging information collected for this host.
          {% endif %}

          {% endfor %}
        dest: "{{ aggregated_file }}"
        mode: '0644'
      delegate_to: localhost
      run_once: true               # only one host performs the write
      changed_when: true

    - name: Show where the aggregated report was written (optional)
      ansible.builtin.debug:
        msg: "Aggregated password‑aging report created at {{ aggregated_file }} on the control node."
      delegate_to: localhost
      run_once: true
