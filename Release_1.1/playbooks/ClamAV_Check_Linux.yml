---
# --------------------------------------------------------------
# Playbook: ClamAV_Check_Linux.yml
# Purpose : Audit ClamAV scanner/updater status on Linux hosts,
#           avoid false positives from freshclam-only installs,
#           and aggregate results into /tmp on the control node.
# --------------------------------------------------------------

- name: ClamAV Installation and Signature Audit
  hosts: all
  gather_facts: false
  become: false

  tasks:

    - name: Check ClamAV scanner version
      ansible.builtin.command: clamscan --version
      register: clamscan_version
      changed_when: false
      failed_when: false

    - name: Check Freshclam updater version
      ansible.builtin.command: freshclam --version
      register: freshclam_version
      changed_when: false
      failed_when: false

    - name: Check ClamAV RPM packages
      ansible.builtin.command: rpm -q clamav clamav-update clamd
      register: clamav_rpm_check
      changed_when: false
      failed_when: false

    - name: Capture UTC timestamp for this host
      ansible.builtin.command: date -u +"%Y-%m-%d %H:%M:%S UTC"
      register: host_timestamp
      changed_when: false
      failed_when: false

    - name: Build ClamAV audit facts
      ansible.builtin.set_fact:
        clamav_audit:
          scanner_installed: "{{ clamscan_version.rc == 0 }}"
          updater_installed: "{{ freshclam_version.rc == 0 }}"
          clamav_installed: "{{ clamscan_version.rc == 0 }}"
          fully_installed: "{{ clamscan_version.rc == 0 and freshclam_version.rc == 0 }}"

          scanner_version_raw: >-
            {{
              clamscan_version.stdout
              if clamscan_version.rc == 0
              else 'clamscan not installed or not in PATH'
            }}

          freshclam_version_raw: >-
            {{
              freshclam_version.stdout
              if freshclam_version.rc == 0
              else 'freshclam not installed or not in PATH'
            }}

          engine_version: >-
            {{
              clamscan_version.stdout.split('/')[0]
              if clamscan_version.rc == 0 and '/' in clamscan_version.stdout
              else 'unknown'
            }}

          signature_version: >-
            {{
              clamscan_version.stdout.split('/')[1]
              if clamscan_version.rc == 0 and clamscan_version.stdout.split('/') | length > 1
              else 'unknown'
            }}

          signature_date: >-
            {{
              clamscan_version.stdout.split('/')[2]
              if clamscan_version.rc == 0 and clamscan_version.stdout.split('/') | length > 2
              else 'unknown'
            }}

          rpm_packages: "{{ clamav_rpm_check.stdout_lines | default([]) }}"
          rpm_package_errors: "{{ clamav_rpm_check.stderr_lines | default([]) }}"


- name: Write aggregated ClamAV audit report on control node
  hosts: localhost
  gather_facts: false
  become: false

  vars:
    aggregated_file: "/tmp/clamav_audit_{{ lookup('pipe', 'date -u +%Y-%m-%d_%H-%M-%S') }}.txt"
    audit_hosts: "{{ groups['all'] | difference(['localhost']) }}"

  tasks:

    - name: Write aggregated ClamAV audit report
      ansible.builtin.copy:
        dest: "{{ aggregated_file }}"
        mode: "0644"
        content: |
          ClamAV Audit Report
          Generated: {{ lookup('pipe', 'date -u +"%Y-%m-%d %H:%M:%S UTC"') }}

          {% for host in audit_hosts %}
          ============================================================
          Host: {{ host }}
          ============================================================

          Timestamp          : {{ hostvars[host].host_timestamp.stdout | default('N/A') }}

          Scanner installed  : {{ hostvars[host].clamav_audit.scanner_installed | default('N/A') }}
          Updater installed  : {{ hostvars[host].clamav_audit.updater_installed | default('N/A') }}
          ClamAV installed   : {{ hostvars[host].clamav_audit.clamav_installed | default('N/A') }}
          Fully installed    : {{ hostvars[host].clamav_audit.fully_installed | default('N/A') }}

          Engine version     : {{ hostvars[host].clamav_audit.engine_version | default('N/A') }}
          Signature version  : {{ hostvars[host].clamav_audit.signature_version | default('N/A') }}
          Signature date     : {{ hostvars[host].clamav_audit.signature_date | default('N/A') }}

          Raw clamscan output:
          {{ hostvars[host].clamav_audit.scanner_version_raw | default('N/A') }}

          Raw freshclam output:
          {{ hostvars[host].clamav_audit.freshclam_version_raw | default('N/A') }}

          RPM package results:
          {% for pkg in hostvars[host].clamav_audit.rpm_packages | default([]) %}
          - {{ pkg }}
          {% endfor %}

          RPM package errors:
          {% for err in hostvars[host].clamav_audit.rpm_package_errors | default([]) %}
          - {{ err }}
          {% endfor %}

          {% endfor %}

    - name: Inform where the aggregated report is stored
      ansible.builtin.debug:
        msg: "Aggregated ClamAV audit saved as {{ aggregated_file }} on the control node."
